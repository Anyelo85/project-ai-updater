name: Project AI Updater

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-project:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout bot's own repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests openai

      - name: Verify Secrets Presence
        run: |
          if [ -z "${{ secrets.OLLAMA_NGROK_URL }}" ]; then echo "❌ ERROR: OLLAMA_NGROK_URL no está definido en Secrets."; fi
          if [ -z "${{ secrets.TARGET_REPO_URL }}" ]; then echo "❌ ERROR: TARGET_REPO_URL no está definido en Secrets."; fi
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then echo "❌ ERROR: GITHUB_TOKEN no está definido en Secrets."; fi

      - name: Run the updater script
        env:
          OLLAMA_NGROK_URL: ${{ secrets.OLLAMA_NGROK_URL }}
          TARGET_REPO_URL: ${{ secrets.TARGET_REPO_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/ai_agent.py
